<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Contact Form & AI Q&A</title>
    <style>
        /* Container fixed to the bottom right */
        #chatbot-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            font-family: Arial, sans-serif;
        }

        /* The floating button */
        #chatbot-toggle-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #2ab2c4;
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }

        #chatbot-toggle-btn:hover {
            transform: scale(1.05);
        }

        /* The chat window container */
        #chatbot-window {
            width: 360px;
            height: auto;
            background-color: #f9f9fa;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: absolute;
            bottom: 80px;
            right: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            border: 1px solid #ddd;
        }

        /* Class to hide the window smoothly */
        .hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }

        /* Header styling */
        .chat-header {
            background-color: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .header-icon {
            font-size: 20px;
            line-height: 1;
        }

        #chatbot-close-btn {
            background-color: #ff4444;
            border: 1px solid #cc0000;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .chat-body {
            padding: 20px;
            background-color: white;
        }

        /* --- FORM STYLES --- */
        #chat-contact-form {
            display: flex;
            flex-direction: column;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            margin-bottom: 15px;
        }

        .form-row .input-group {
            margin-bottom: 0; 
        }

        #chat-contact-form label {
            font-size: 14px;
            color: #555;
            margin-bottom: 5px;
        }

        #chat-contact-form input,
        #chat-contact-form textarea,
        #chat-input-text {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 2px;
            outline: none;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }

        #chat-contact-form input:focus,
        #chat-contact-form textarea:focus,
        #chat-input-text:focus {
            border-color: #2ab2c4;
        }

        #chat-contact-form textarea {
            resize: vertical;
        }

        #chat-submit-btn,
        #chat-send-btn {
            padding: 10px 20px;
            background-color: #38b6c4;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        #chat-submit-btn {
            margin-top: 10px;
            align-self: flex-start;
        }

        #chat-submit-btn:hover,
        #chat-send-btn:hover {
            background-color: #2c939e;
        }

        #chat-status-msg {
            display: none;
            font-size: 13px;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

        /* --- NEW CHAT INTERFACE STYLES --- */
        #chat-interface {
            display: none; 
            flex-direction: column;
            height: 350px; 
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }

        .chat-msg {
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-msg {
            background-color: #2ab2c4;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot-msg {
            background-color: #f1f1f1;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .typing-indicator {
            font-style: italic;
            color: #888;
            font-size: 12px;
            align-self: flex-start;
            margin-bottom: 10px;
            display: none; /* Hidden by default */
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        #chat-input-text {
            flex: 1;
            border-radius: 20px;
            padding: 10px 15px;
        }
    </style>
</head>
<body>
    
<div id="chatbot-container">
    <button id="chatbot-toggle-btn">💬</button>

    <div id="chatbot-window" class="hidden">
        
        <div class="chat-header">
            <div class="header-icon">🤖</div> <button id="chatbot-close-btn">&times;</button>
        </div>
        
        <div class="chat-body">
            <form id="chat-contact-form">
                <div class="form-row">
                    <div class="input-group">
                        <label for="chat-name">Name*</label>
                        <input type="text" id="chat-name" required>
                    </div>
                    <div class="input-group">
                        <label for="chat-email">E-mail*</label>
                        <input type="email" id="chat-email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="chat-phone">Phone*</label>
                    <input type="tel" id="chat-phone" required>
                </div>

                <div class="input-group">
                    <label for="chat-message">Your question*</label>
                    <textarea id="chat-message" rows="3" placeholder="Enter your message" required></textarea>
                </div>

                <button type="submit" id="chat-submit-btn">Start chat</button>
            </form>
            
            <p id="chat-status-msg"></p>

            <div id="chat-interface">
                <div id="chat-messages">
                    </div>
                <div id="typing-indicator" class="typing-indicator">Bot is typing...</div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input-text" placeholder="Type a message...">
                    <button id="chat-send-btn">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // --- REPLACE THIS WITH YOUR ACTUAL API KEY ---
    // Get a free key from Google AI Studio (aistudio.google.com)
    const AI_API_KEY = "YOUR_API_KEY_HERE"; 

    // UI Elements
    const toggleBtn = document.getElementById('chatbot-toggle-btn');
    const closeBtn = document.getElementById('chatbot-close-btn');
    const chatWindow = document.getElementById('chatbot-window');
    
    // Form Elements
    const form = document.getElementById('chat-contact-form');
    const submitBtn = document.getElementById('chat-submit-btn');
    const statusMsg = document.getElementById('chat-status-msg');

    // Chat Interface Elements
    const chatInterface = document.getElementById('chat-interface');
    const chatMessages = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input-text');
    const chatSendBtn = document.getElementById('chat-send-btn');
    const typingIndicator = document.getElementById('typing-indicator');

    // Open/Close chat widget
    toggleBtn.addEventListener('click', () => {
        chatWindow.classList.toggle('hidden');
    });

    closeBtn.addEventListener('click', () => {
        chatWindow.classList.add('hidden');
    });

    // Handle Form Submission (Untouched Web3Forms logic)
    form.addEventListener('submit', async function(e) {
        e.preventDefault(); 

        submitBtn.innerText = "Sending...";
        submitBtn.disabled = true;

        const name = document.getElementById('chat-name').value;
        const phone = document.getElementById('chat-phone').value;
        const email = document.getElementById('chat-email').value;
        const message = document.getElementById('chat-message').value;

        const payload = {
            access_key: "7db7287d-0fe4-4b90-a349-0f2cd7479b40",
            subject: "New Question from Chatbot Widget",
            from_name: name,
            email: email,
            phone: phone,
            message: message 
        };

        try {
            const response = await fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (result.success) {
                form.style.display = 'none';           
                statusMsg.style.display = 'none';      
                chatInterface.style.display = 'flex';  

                // Add the user's initial message
                appendMessage(message, 'user');

                // Trigger the AI to answer the initial question
                processAIResponse(message);

            } else {
                statusMsg.style.display = 'block';
                statusMsg.style.color = '#e74c3c'; 
                statusMsg.innerText = 'Failed to send. Please try again.';
                submitBtn.innerText = "Start chat";
                submitBtn.disabled = false;
            }
        } catch (error) {
            statusMsg.style.display = 'block';
            statusMsg.style.color = '#e74c3c';
            statusMsg.innerText = 'Network error. Please check your connection.';
            submitBtn.innerText = "Start chat";
            submitBtn.disabled = false;
        }
    });

    // Function to add a message to the chat window
    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('chat-msg');
        msgDiv.classList.add(sender === 'user' ? 'user-msg' : 'bot-msg');
        
        // Basic formatting to handle line breaks from the AI
        msgDiv.innerHTML = text.replace(/\n/g, '<br>'); 
        
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight; // Auto-scroll
    }

    // --- THE REAL AI BRAIN (API CALL) ---
    async function processAIResponse(userInput) {
        // Show typing indicator
        typingIndicator.style.display = 'block';
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // API Endpoint (Using Gemini 1.5 Flash as an example)
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AI_API_KEY}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            // Giving the AI a tiny bit of context so it acts like a customer service bot
                            text: "You are a helpful customer service assistant for a website. Answer briefly and politely. The user asks: " + userInput
                        }]
                    }]
                })
            });

            const data = await response.json();
            
            // Hide typing indicator
            typingIndicator.style.display = 'none';

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const aiReply = data.candidates[0].content.parts[0].text;
                appendMessage(aiReply, 'bot');
            } else {
                appendMessage("I'm sorry, I couldn't understand that response. A human will contact you soon.", 'bot');
            }

        } catch (error) {
            console.error("API Error:", error);
            typingIndicator.style.display = 'none';
            appendMessage("Sorry, my connection to the server is down right now. We have received your email though!", 'bot');
        }
    }

    // Handle sending new messages in the chat interface
    function handleChatSend() {
        const text = chatInput.value.trim();
        if (text === '') return;

        // 1. Show user message
        appendMessage(text, 'user');
        chatInput.value = '';

        // 2. Send to AI
        processAIResponse(text);
    }

    // Click event for the "Send" button
    chatSendBtn.addEventListener('click', handleChatSend);

    // Allow pressing "Enter" to send a message
    chatInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            handleChatSend();
        }
    });
});
</script>
</body>
</html>
